name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Find Android project
        shell: bash
        run: |
          PROJECT_DIR="."
          if [ ! -f "settings.gradle" ]; then
            FOUND="$(find . -maxdepth 3 -name settings.gradle | head -n 1)"
            if [ -z "$FOUND" ]; then
              echo "Could not find settings.gradle. Upload the Android project files first."
              exit 1
            fi
            PROJECT_DIR="$(dirname "$FOUND")"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Using Android project at $PROJECT_DIR"

      - name: Build debug APK
        run: gradle -p "${{ env.PROJECT_DIR }}" :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prism-calculator-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
